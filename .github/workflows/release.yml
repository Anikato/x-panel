name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # 前端只构建一次，两个架构共享
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: |
          cd frontend
          npm ci
          npx vite build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # 后端按架构矩阵构建
  build-backend:
    needs: build-frontend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: backend/cmd/server/web/assets

      - name: Download Go dependencies
        run: |
          cd backend
          go mod download

      - name: Build backend
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
        run: |
          VERSION=${GITHUB_REF_NAME}
          COMMIT_HASH=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u '+%Y-%m-%d_%H:%M:%S')
          GO_VERSION=$(go version | awk '{print $3}')

          cd backend
          go build -trimpath \
            -ldflags "-s -w \
              -X 'xpanel/app/version.Version=${VERSION}' \
              -X 'xpanel/app/version.CommitHash=${COMMIT_HASH}' \
              -X 'xpanel/app/version.BuildTime=${BUILD_TIME}' \
              -X 'xpanel/app/version.GoVersion=${GO_VERSION}'" \
            -o ../build/xpanel ./cmd/server/

      - name: Package
        run: |
          VERSION=${GITHUB_REF_NAME}
          ARCH=${{ matrix.arch }}
          RELEASE_DIR=build/release
          PKG_NAME=xpanel-${VERSION}-linux-${ARCH}

          mkdir -p ${RELEASE_DIR}
          cp build/xpanel ${RELEASE_DIR}/
          cp backend/configs/config.yaml ${RELEASE_DIR}/config.yaml.example
          [ -f scripts/install.sh ] && cp scripts/install.sh ${RELEASE_DIR}/ || true
          [ -f scripts/xpanel.service ] && cp scripts/xpanel.service ${RELEASE_DIR}/ || true
          [ -f scripts/xpctl ] && cp scripts/xpctl ${RELEASE_DIR}/ || true
          [ -f xray-install.sh ] && cp xray-install.sh ${RELEASE_DIR}/ || true

          cd build
          tar -czf ${PKG_NAME}.tar.gz -C release .
          sha256sum ${PKG_NAME}.tar.gz > ${PKG_NAME}.tar.gz.sha256
          rm -rf release

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: xpanel-linux-${{ matrix.arch }}
          path: |
            build/xpanel-*.tar.gz
            build/xpanel-*.tar.gz.sha256

  # 创建 Release
  release:
    needs: build-backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') || contains(github.ref_name, 'alpha') }}
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.sha256

      - name: Prepare update server files
        env:
          UPDATE_BASE_URL: ${{ vars.UPDATE_BASE_URL || 'https://xpanel.qm.mk' }}
        run: |
          python3 <<'PY'
          import datetime
          import glob
          import json
          import os
          import shutil
          from pathlib import Path

          version = os.environ["GITHUB_REF_NAME"]
          base_url = os.environ.get("UPDATE_BASE_URL", "https://xpanel.qm.mk").rstrip("/")
          publish_dir = Path("publish")
          release_dir = publish_dir / "releases" / version
          release_dir.mkdir(parents=True, exist_ok=True)

          assets = {}
          for package in sorted(glob.glob("artifacts/xpanel-*-linux-*.tar.gz")):
              package_path = Path(package)
              shutil.copy2(package_path, release_dir / package_path.name)
              shutil.copy2(package_path, publish_dir / package_path.name)

              checksum_path = Path(str(package_path) + ".sha256")
              if checksum_path.exists():
                  shutil.copy2(checksum_path, release_dir / checksum_path.name)
                  shutil.copy2(checksum_path, publish_dir / checksum_path.name)
                  sha256 = checksum_path.read_text(encoding="utf-8").split()[0]
              else:
                  sha256 = ""

              arch = package_path.name.removesuffix(".tar.gz").split("-linux-", 1)[1]
              url = f"{base_url}/releases/{version}/{package_path.name}"
              assets[f"linux-{arch}"] = {
                  "url": url,
                  "checksumUrl": f"{url}.sha256",
                  "sha256": sha256,
                  "size": package_path.stat().st_size,
              }

          publish_date = datetime.datetime.utcnow().strftime("%Y-%m-%d")
          manifest = {
              "version": version,
              "releaseNote": "",
              "publishDate": publish_date,
              "assets": assets,
          }

          latest_path = publish_dir / "releases" / "latest.json"
          latest_path.parent.mkdir(parents=True, exist_ok=True)
          latest_path.write_text(json.dumps(manifest, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")

          legacy = {
              "version": version,
              "releaseNote": "",
              "publishDate": publish_date,
          }
          (publish_dir / "version.json").write_text(json.dumps(legacy, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          shutil.copy2("scripts/install-online.sh", publish_dir / "install-online.sh")
          shutil.copy2("scripts/install-xpctl.sh", publish_dir / "install-xpctl.sh")
          PY

          find publish -type f | sort

      - name: Configure update server SSH
        if: ${{ vars.UPDATE_SERVER_HOST != '' }}
        env:
          UPDATE_SERVER_HOST: ${{ vars.UPDATE_SERVER_HOST }}
          UPDATE_SERVER_PORT: ${{ vars.UPDATE_SERVER_PORT || '22' }}
          UPDATE_SERVER_SSH_KEY: ${{ secrets.UPDATE_SERVER_SSH_KEY }}
        run: |
          test -n "$UPDATE_SERVER_SSH_KEY"
          mkdir -p ~/.ssh
          printf '%s\n' "$UPDATE_SERVER_SSH_KEY" > ~/.ssh/xpanel_update_server
          chmod 600 ~/.ssh/xpanel_update_server
          ssh-keyscan -p "$UPDATE_SERVER_PORT" "$UPDATE_SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Deploy to update server
        if: ${{ vars.UPDATE_SERVER_HOST != '' }}
        env:
          UPDATE_SERVER_HOST: ${{ vars.UPDATE_SERVER_HOST }}
          UPDATE_SERVER_USER: ${{ vars.UPDATE_SERVER_USER || 'root' }}
          UPDATE_SERVER_PORT: ${{ vars.UPDATE_SERVER_PORT || '22' }}
          UPDATE_SERVER_PATH: ${{ vars.UPDATE_SERVER_PATH || '/var/www/xpanel' }}
        run: |
          ssh -i ~/.ssh/xpanel_update_server -p "$UPDATE_SERVER_PORT" \
            "$UPDATE_SERVER_USER@$UPDATE_SERVER_HOST" "mkdir -p '$UPDATE_SERVER_PATH/releases'"
          scp -i ~/.ssh/xpanel_update_server -P "$UPDATE_SERVER_PORT" -r publish/. \
            "$UPDATE_SERVER_USER@$UPDATE_SERVER_HOST:$UPDATE_SERVER_PATH/"
